name: Type Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pyright:
    uses: ./.github/workflows/python_check.yml
    with:
      job_name: Pyright
      command: uv run pyright

  mypy:
    uses: ./.github/workflows/python_check.yml
    with:
      job_name: Mypy
      command: uv run mypy
      append_python_version_arg: true
