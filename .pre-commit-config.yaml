repos:
  - repo: local
    hooks:
      - id: pyright-check
        name: Run Pyright
        entry: uv
        args: [run, pyright]
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest-check
        name: Run Pytest (pre-push)
        entry: uv
        args: [run, pytest, --no-cov]
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.14.11
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
