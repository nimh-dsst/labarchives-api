[project]
name = "labapi"
version = "0.1.0"
description = "A Python client for the LabArchives API."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "cryptography>=46.0.3",
    "lxml>=6.0.2",
    "pre-commit>=4.5.1",
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "python-dotenv>=1.2.1",
    "requests>=2.32.5",
    "selenium>=4.39.0",
    "types-lxml>=2026.1.1",
]

[dependency-groups]
dev = [
    "ruff>=0.14.11",
]
