[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "labapi"
version = "0.1.0"
description = "A Python client for the LabArchives API."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "CC0" }
authors = [
  { name = "Christoph Li", email = "christoph.li@nih.gov" },
  { name = "Joshua Lawrimore", email = "josh.lawrimore@nih.gov"},
  # TODO add Adam & Dustin
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "cryptography>=46.0.3",
    "lxml>=6.0.2",
    "requests>=2.32.5",
    "types-lxml>=2026.1.1",

]

[project.optional-dependencies]
builtin-auth = [
    "selenium>=4.39.0",
    "installed-browsers>=0.1.5"
]
dotenv = [
    "labapi",
    "python-dotenv>=1.2.1",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.14.11",
    "pre-commit>=4.5.1",
    "sphinx>=9.1.0",
    "sphinx-breeze-theme>=0.13.1",
    "sphinx-copybutton>=0.5.2",
    "sphinx-design>=0.7.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = "src"
testpaths = ["tests", "src"]
addopts = "--cov=labapi --cov-report=term-missing"

[tool.uv.workspace]
members = [
    ".",
]

[tool.uv.sources]
labapi = { workspace = true }
